  <style>
    /* ── Logo size constraint for news page ── */
    .header .logo svg {
      max-height: 48px;
      width: auto;
    }

    /* ── Page layout ── */
    .news-section {
      padding-top: 100px;
      min-height: 100vh;
    }

    .news-page-title {
      font-family: var(--heading-font);
      color: var(--heading-color);
      font-size: 1.6rem;
      font-weight: 700;
      margin-bottom: 0;
    }

    .news-page-meta {
      font-size: 0.82rem;
      color: #888;
      display: flex;
      align-items: center;
      gap: 12px;
      margin-top: 4px;
    }

    /* ── 3-column layout ── */
    .news-grid {
      display: grid;
      grid-template-columns: 240px minmax(0, 1fr) 260px;
      gap: 20px;
      align-items: start;
      margin-top: 20px;
    }

    /* ── Sidebar panels ── */
    .sidebar-panel {
      position: sticky;
      top: 110px;
      background: var(--surface-color);
      border-radius: 8px;
      border: 1px solid #e0e0e0;
      padding: 16px;
      max-height: calc(100vh - 130px);
      overflow-y: auto;
    }

    .section-label {
      font-size: 0.68rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.09em;
      color: #999;
      margin-bottom: 8px;
    }

    .sidebar-divider {
      border-top: 1px solid #eee;
      margin: 14px 0;
    }

    /* ── Filter buttons ── */
    .year-btn {
      font-size: 0.8rem;
      border-radius: 20px;
      margin: 2px;
      padding: 3px 11px;
    }

    .month-btn {
      font-size: 0.74rem;
      border-radius: 14px;
      margin: 2px;
      padding: 2px 7px;
      min-width: 38px;
    }

    #sort-toggle { font-size: 0.82rem; }
    #clear-filters { font-size: 0.78rem; }

    /* ── Search field ── */
    .news-search-wrap {
      position: relative;
    }

    .news-search-wrap .bi-search {
      position: absolute;
      left: 10px;
      top: 50%;
      transform: translateY(-50%);
      color: #aaa;
      font-size: 0.8rem;
    }

    .news-search-wrap input {
      padding-left: 30px;
      font-size: 0.85rem;
      border-color: #e0e0e0;
      border-radius: 6px;
    }

    .news-search-wrap input:focus {
      border-color: var(--accent-color);
      box-shadow: 0 0 0 0.2rem color-mix(in srgb, var(--accent-color), transparent 80%);
    }

    /* ── Post cards ── */
    .post-card {
      background: var(--surface-color);
      border-radius: 8px;
      border: 1px solid #e0e0e0;
      margin-bottom: 10px;
      overflow: hidden;
      transition: box-shadow 0.15s;
    }

    .post-card:hover {
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
    }

    .post-card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 16px 6px;
    }

    .post-date {
      font-size: 0.76rem;
      color: #888;
    }

    .anchor-btn {
      background: none;
      border: none;
      cursor: pointer;
      font-size: 0.8rem;
      opacity: 0;
      padding: 0;
      line-height: 1;
      transition: opacity 0.15s;
      color: #555;
    }

    .post-card:hover .anchor-btn { opacity: 1; }

    .post-text {
      padding: 4px 16px 12px;
      font-size: 0.88rem;
      color: var(--default-color);
      line-height: 1.6;
      white-space: pre-wrap;
    }

    .post-media-wrap {
      line-height: 0;
    }

    .post-media {
      width: 100%;
      max-height: 380px;
      object-fit: cover;
      display: block;
    }

    video.post-media {
      max-height: 627px;
    }

    .post-links {
      padding: 8px 16px 12px;
      font-size: 0.76rem;
      color: #555;
      border-top: 1px solid #f0f0f0;
    }

    .post-links a {
      color: var(--accent-color);
      text-decoration: none;
      word-break: break-all;
    }

    .post-links a:hover { text-decoration: underline; }

    .post-urn {
      font-size: 0.68rem;
      color: #bbb;
      margin-top: 3px;
    }

    .highlighted {
      outline: 2px solid var(--accent-color);
      box-shadow: 0 0 0 4px color-mix(in srgb, var(--accent-color), transparent 80%);
    }

    /* ── Stats panel ── */
    .stat-total {
      font-size: 2rem;
      font-weight: 700;
      color: var(--heading-color);
      line-height: 1;
      font-family: var(--heading-font);
    }

    .stat-sublabel {
      font-size: 0.72rem;
      color: #aaa;
      margin-top: 1px;
    }

    .stat-range {
      font-size: 0.72rem;
      color: #888;
      margin-top: 8px;
      line-height: 1.5;
    }

    .stat-year-row {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 7px;
    }

    .stat-year-label {
      font-size: 0.73rem;
      color: #555;
      width: 34px;
      flex-shrink: 0;
    }

    .stat-bar-wrap {
      flex: 1;
      background: #f0f0f0;
      border-radius: 3px;
      height: 7px;
      overflow: hidden;
    }

    .stat-bar {
      height: 100%;
      background: var(--accent-color);
      border-radius: 3px;
    }

    .stat-year-count {
      font-size: 0.7rem;
      color: #aaa;
      width: 26px;
      text-align: right;
      flex-shrink: 0;
    }

    .stat-media-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 5px 8px;
      border-radius: 6px;
      font-size: 0.8rem;
      cursor: pointer;
      transition: background 0.12s;
      color: #333;
      margin-bottom: 2px;
      user-select: none;
    }

    .stat-media-row:hover { background: color-mix(in srgb, var(--accent-color), transparent 92%); }

    .stat-media-row.active {
      background: color-mix(in srgb, var(--accent-color), transparent 88%);
      color: var(--accent-color);
      font-weight: 600;
    }

    .stat-media-count {
      font-size: 0.72rem;
      color: #999;
      font-weight: 600;
    }

    .stat-media-row.active .stat-media-count { color: var(--accent-color); }

    .stat-filter-hint {
      font-size: 0.68rem;
      color: #bbb;
      margin-bottom: 6px;
    }

    .rss-link {
      display: flex;
      align-items: center;
      opacity: 0.7;
      transition: opacity 0.15s;
    }

    .rss-link:hover { opacity: 1; }

    /* ── Responsive ── */
    @media (max-width: 980px) {
      .news-grid { grid-template-columns: 200px minmax(0, 1fr); }
      .stats-col { display: none; }
    }

    @media (max-width: 620px) {
      .news-grid { grid-template-columns: 1fr; }
      .filters-col { display: none; }
      .news-section { padding-top: 80px; }
    }
  </style>

    let dateFrom = null;
    let dateTo = null;

    // Resolve data path correctly whether URL ends with /news or /news/
    const DATA_BASE = (function() {
      var p = location.pathname;
      if (!p.endsWith('/')) {
        var seg = p.split('/').pop();
        p = seg.includes('.') ? p.substring(0, p.lastIndexOf('/') + 1) : p + '/';
      }
      return location.origin + p;
    })();

    async function fetchData() {
      try {
        const [dataRes, indexRes] = await Promise.all([
          fetch(DATA_BASE + 'data/extracted_data.json'),
          fetch(DATA_BASE + 'data/media_index.json'),
        ]);
        originalData = await dataRes.json();
        mediaIndex   = await indexRes.json();
        buildSidebar();
        buildStats();
        applyFilters();
      } catch (e) {
        document.getElementById('data-container').innerHTML =
          '<div class="alert alert-danger">Errore nel caricamento dei dati.</div>';
      }
    }

    function buildSidebar() {
      const years = [...new Set(originalData.map(d => d.date?.slice(0,4)).filter(Boolean))].sort((a,b) => b-a);

      const yearContainer = document.getElementById('year-filters');
      yearContainer.innerHTML = '';
      years.forEach(y => {
        const btn = document.createElement('button');
        btn.className = 'btn btn-outline-primary year-btn';
        btn.textContent = y;
        btn.dataset.year = y;
        btn.addEventListener('click', () => toggleYear(y, btn));
        yearContainer.appendChild(btn);
      });

      const monthContainer = document.getElementById('month-filters');
      monthContainer.innerHTML = '';
      MONTHS_SHORT.forEach((m, i) => {
        const btn = document.createElement('button');
        btn.className = 'btn btn-outline-secondary month-btn';
        btn.textContent = m;
        btn.dataset.month = String(i + 1).padStart(2, '0');
        btn.addEventListener('click', () => toggleMonth(btn.dataset.month, btn));
        monthContainer.appendChild(btn);
      });
    }

    function buildStats() {
      const total = originalData.length;
      const dates = originalData.map(d => d.date).filter(Boolean).sort();
      const oldest = dates[0];
      const newest = dates[dates.length - 1];

      const byYear = {};
      originalData.forEach(d => {
        if (d.date) {
          const y = d.date.slice(0,4);
          byYear[y] = (byYear[y] || 0) + 1;
        }
      });

      const byMedia = { image: 0, video: 0, doc: 0, text: 0 };
      originalData.forEach(d => {
        const t = d.media_type;
        if (t && byMedia[t] !== undefined) byMedia[t]++;
        else byMedia.text++;
      });

      const maxYear = Math.max(...Object.values(byYear));

      const yearRows = Object.entries(byYear)
        .sort((a, b) => b[0] - a[0])
        .map(([y, count]) => {
          const pct = Math.round((count / maxYear) * 100);
          return `<div class="stat-year-row">
            <span class="stat-year-label">${y}</span>
            <div class="stat-bar-wrap"><div class="stat-bar" style="width:${pct}%"></div></div>
            <span class="stat-year-count">${count}</span>
          </div>`;
        }).join('');

      const mediaTypes = [
        { key: 'image', label: 'Immagini',  icon: '<i class="bi bi-image"></i>' },
        { key: 'video', label: 'Video',      icon: '<i class="bi bi-play-circle"></i>' },
        { key: 'doc',   label: 'Documenti',  icon: '<i class="bi bi-file-earmark"></i>' },
        { key: 'text',  label: 'Solo testo', icon: '<i class="bi bi-chat-text"></i>' },
      ];

      const mediaRows = mediaTypes.map(({ key, label, icon }) => {
        const count = byMedia[key] || 0;
        const active = selectedMediaType === key ? 'active' : '';
        return `<div class="stat-media-row ${active}" onclick="toggleMediaType('${key}')">
          <span>${icon}&nbsp; ${label}</span>
          <span class="stat-media-count">${count}</span>
        </div>`;
      }).join('');

      document.getElementById('stats-panel').innerHTML = `
        <div class="mb-1">
          <div class="section-label">Totale</div>
          <div class="stat-total">${total}</div>
          <div class="stat-sublabel">post</div>
          <div class="stat-range">${formatDate(oldest)}<br>→ ${formatDate(newest)}</div>
        </div>
        <div class="sidebar-divider"></div>
        <div class="mb-1">
          <div class="section-label">Per anno</div>
          ${yearRows}
        </div>
        <div class="sidebar-divider"></div>
        <div>
          <div class="section-label">Tipo di media</div>
          <div class="stat-filter-hint">Clicca per filtrare</div>
          ${mediaRows}
        </div>
      `;
    }

    function toggleMediaType(key) {
      selectedMediaType = selectedMediaType === key ? null : key;
      buildStats();
      applyFilters();
    }

    function toggleYear(year, btn) {
      if (selectedYears.has(year)) {
        selectedYears.delete(year);
        btn.classList.remove('active', 'btn-primary');
        btn.classList.add('btn-outline-primary');
      } else {
        selectedYears.add(year);
        btn.classList.add('active', 'btn-primary');
        btn.classList.remove('btn-outline-primary');
      }
      applyFilters();
    }

    function toggleMonth(month, btn) {
      if (selectedMonths.has(month)) {
        selectedMonths.delete(month);
        btn.classList.remove('active', 'btn-secondary');
        btn.classList.add('btn-outline-secondary');
      } else {
        selectedMonths.add(month);
        btn.classList.add('active', 'btn-secondary');
        btn.classList.remove('btn-outline-secondary');
      }
      applyFilters();
    }

    function applyFilters() {
      let data = [...originalData];

      if (searchQuery) {
        const q = searchQuery.toLowerCase();
        data = data.filter(item =>
          Object.values(item).some(v =>
            v && (Array.isArray(v)
              ? v.some(s => s.toLowerCase().includes(q))
              : v.toString().toLowerCase().includes(q))
          )
        );
      }

      if (selectedYears.size > 0) {
        data = data.filter(item => item.date && selectedYears.has(item.date.slice(0,4)));
      }

      if (selectedMonths.size > 0) {
        data = data.filter(item => item.date && selectedMonths.has(item.date.slice(5,7)));
      }

      if (dateFrom || dateTo) {
        data = data.filter(item => {
          if (!item.date) return false;
          if (dateFrom && item.date < dateFrom) return false;
          if (dateTo && item.date > dateTo) return false;
          return true;
        });
      }

      if (selectedMediaType) {
        if (selectedMediaType === 'text') {
          data = data.filter(item => !item.media_type);
        } else {
          data = data.filter(item => item.media_type === selectedMediaType);
        }
      }

      data.sort((a, b) => {
        const da = a.date || '';
        const db = b.date || '';
        return sortOrder === 'desc' ? db.localeCompare(da) : da.localeCompare(db);
      });

      renderData(data);
    }

    function formatDate(dateStr) {
      if (!dateStr) return '';
      const [y, m, d] = dateStr.split('-');
      return `${parseInt(d)} ${MONTHS_FULL[parseInt(m) - 1]} ${y}`;
    }

    function renderData(data) {
      const container = document.getElementById('data-container');
      document.getElementById('item-count').textContent = `${data.length} post`;

      if (data.length === 0) {
        container.innerHTML = '<div class="text-muted mt-4 text-center">Nessun risultato.</div>';
        return;
      }

      container.innerHTML = '';
      data.forEach(item => {
        const postId = item.urn ? item.urn.replace(/:/g,'_').replace(/\//g,'_') : null;
        const div = document.createElement('div');
        div.className = 'post-card';
        if (postId) div.id = postId;

        let html = '';

        html += `<div class="post-card-header">`;
        html += `<span class="post-date">${formatDate(item.date)}</span>`;
        if (postId) {
          html += `<button class="anchor-btn" title="Copia link diretto" onclick="copyAnchor('${postId}')"><i class="bi bi-link-45deg"></i></button>`;
        }
        html += `</div>`;

        if (item.text) {
          html += `<div class="post-text">${escapeHtml(item.text)}</div>`;
        }

        html += mediaHtml(item);

        const hasLinks = item.link || item['inline-url']?.length > 0 || item.urn;
        if (hasLinks) {
          html += `<div class="post-links">`;
          if (item.link) {
            html += `<div><strong>Link:</strong> <a href="${item.link}" target="_blank" rel="noopener">${item.link}</a></div>`;
          }
          if (item['inline-url']?.length > 0) {
            html += `<div><strong>URL nel testo:</strong> ${item['inline-url'].map(u => `<a href="${u}" target="_blank" rel="noopener">${u}</a>`).join(', ')}</div>`;
          }
          if (item.urn) {
            const liUrl = `https://www.linkedin.com/feed/update/${item.urn}/`;
            html += `<div><a href="${liUrl}" target="_blank" rel="noopener"><i class="bi bi-linkedin"></i> Apri su LinkedIn</a></div>`;
            html += `<div class="post-urn">${item.urn}</div>`;
          }
          html += `</div>`;
        }

        div.innerHTML = html;
        container.appendChild(div);
      });

      scrollToHash();
    }

    const PLAY_BADGE = `<div style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);background:rgba(0,0,0,.45);border-radius:50%;width:52px;height:52px;display:flex;align-items:center;justify-content:center;pointer-events:none;"><i class="bi bi-play-fill" style="color:#fff;font-size:1.6rem;margin-left:3px;"></i></div>`;

    function mediaHtml(item) {
      if (!item.media_url && item.media_type !== 'video') return '';

      const fname    = item.urn ? item.urn.replace(/:/g,'_').replace(/\//g,'_') : null;
      const exts     = fname ? (mediaIndex[fname] || []) : [];
      const hasJpg   = exts.includes('jpg');
      const hasMp4   = exts.includes('mp4');
      const base     = fname ? DATA_BASE + 'data/media/' + fname : null;

      const rawUrl    = (item.media_url || '').replace(/"/g, '');
      const remoteUrl = rawUrl.startsWith('http') ? rawUrl : null;

      if (item.media_type === 'video') {
        if (hasMp4) {
          const poster = hasJpg ? ` poster="${base}.jpg"` : (remoteUrl ? ` poster="${remoteUrl}"` : '');
          return `<div class="post-media-wrap">
            <video class="post-media" controls preload="none"${poster}>
              <source src="${base}.mp4" type="video/mp4">
            </video>
          </div>`;
        }
        if (hasJpg) {
          return `<div class="post-media-wrap" style="position:relative;">
            <img src="${base}.jpg" class="post-media" loading="lazy">
            ${PLAY_BADGE}
          </div>`;
        }
        if (remoteUrl) {
          return `<div class="post-media-wrap" style="position:relative;">
            <img src="${remoteUrl}" class="post-media" loading="lazy" onerror="this.parentElement.style.display='none'">
            ${PLAY_BADGE}
          </div>`;
        }
        return `<div style="padding:6px 16px 10px;font-size:0.76rem;color:#aaa;">
          <i class="bi bi-play-circle"></i> Video non disponibile
          ${item.urn ? ` — <a href="https://www.linkedin.com/feed/update/${item.urn}/" target="_blank" rel="noopener">guarda su LinkedIn</a>` : ''}
        </div>`;
      }

      // image / doc
      if (hasJpg) {
        const fallback = remoteUrl
          ? `this.src='${remoteUrl}';this.onerror=this.style.display='none';`
          : `this.style.display='none';`;
        return `<div class="post-media-wrap">
          <img src="${base}.jpg" class="post-media" loading="lazy" onerror="${fallback}">
        </div>`;
      }
      if (remoteUrl) {
        return `<div class="post-media-wrap">
          <img src="${remoteUrl}" class="post-media" loading="lazy" onerror="this.style.display='none'">
        </div>`;
      }
      return '';
    }

    function escapeHtml(str) {
      return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    function copyAnchor(postId) {
      const url = location.origin + location.pathname + '#' + postId;
      navigator.clipboard.writeText(url).then(() => {
        const btn = document.getElementById(postId)?.querySelector('.anchor-btn');
        if (btn) {
          btn.innerHTML = '<i class="bi bi-check2"></i>';
          setTimeout(() => btn.innerHTML = '<i class="bi bi-link-45deg"></i>', 1200);
        }
      });
    }

    function scrollToHash() {
      if (!location.hash) return;
      const id = location.hash.slice(1);
      const el = document.getElementById(id);
      if (el) {
        el.scrollIntoView({ behavior: 'smooth', block: 'start' });
        el.classList.add('highlighted');
        setTimeout(() => el.classList.remove('highlighted'), 2000);
      }
    }

    window.addEventListener('hashchange', scrollToHash);

    document.getElementById('search-field').addEventListener('input', e => {
      searchQuery = e.target.value;
      applyFilters();
    });

    document.getElementById('sort-toggle').addEventListener('change', e => {
      sortOrder = e.target.value;
      applyFilters();
    });

    document.getElementById('date-from').addEventListener('change', e => {
      dateFrom = e.target.value || null;
      applyFilters();
    });

    document.getElementById('date-to').addEventListener('change', e => {
      dateTo = e.target.value || null;
      applyFilters();
    });

    document.getElementById('clear-filters').addEventListener('click', () => {
      selectedYears.clear();
      selectedMonths.clear();
      selectedMediaType = null;
      dateFrom = null;
      dateTo = null;
      searchQuery = '';
      document.getElementById('search-field').value = '';
      document.getElementById('date-from').value = '';
      document.getElementById('date-to').value = '';
      document.getElementById('sort-toggle').value = 'desc';
      sortOrder = 'desc';
      document.querySelectorAll('.year-btn').forEach(b => {
        b.classList.remove('active', 'btn-primary');
        b.classList.add('btn-outline-primary');
      });
      document.querySelectorAll('.month-btn').forEach(b => {
        b.classList.remove('active', 'btn-secondary');
        b.classList.add('btn-outline-secondary');
      });
      buildStats();
      applyFilters();
    });

    fetchData();
  </script>

</body>
</html>
